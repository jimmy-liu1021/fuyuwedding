<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>婚宴賓客名單</title>
  <style>
    :root {
      --bg: #f6efe6;
      --card: rgba(255, 252, 247, 0.96);
      --card-strong: #fffaf3;
      --ink: #2f241c;
      --muted: #7a695c;
      --accent: #b85c38;
      --accent-soft: #f3d7c7;
      --line: rgba(104, 74, 52, 0.16);
      --shadow: 0 18px 48px rgba(92, 58, 37, 0.14);
      --ok: #2f7d4c;
      --warn: #9b4d30;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(180deg, #fbf6ef 0%, #f4eadc 100%);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 20px 96px;
    }

    .hero {
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 250, 243, 0.95), rgba(247, 234, 223, 0.96));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.16em;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.08;
      font-weight: 800;
    }

    .intro {
      max-width: 760px;
      margin: 16px 0 0;
      font-size: 17px;
      line-height: 1.8;
      color: var(--muted);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .summary-card {
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(104, 74, 52, 0.12);
    }

    .summary-card strong {
      display: block;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .content {
      margin-top: 28px;
    }

    .stroke-section {
      margin-bottom: 28px;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      scroll-margin-top: 24px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .section-header h2 {
      margin: 0;
      font-size: 26px;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    th,
    td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    tbody tr {
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    tbody tr:hover {
      background: rgba(243, 215, 199, 0.28);
    }

    tbody tr.targeted {
      background: rgba(243, 215, 199, 0.62);
    }

    .gift-yes {
      color: var(--ok);
      font-weight: 700;
    }

    .gift-no {
      color: var(--warn);
      font-weight: 700;
    }

    .floating-search {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: min(360px, calc(100vw - 24px));
      padding: 18px;
      border-radius: 24px;
      background: rgba(47, 36, 28, 0.92);
      color: #fffaf3;
      box-shadow: 0 24px 60px rgba(36, 23, 16, 0.34);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .floating-search h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .floating-search p {
      margin: 0 0 14px;
      color: rgba(255, 250, 243, 0.72);
      line-height: 1.6;
      font-size: 14px;
    }

    .search-controls {
      display: grid;
      gap: 10px;
    }

    .floating-search input,
    .floating-search select,
    .floating-search button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }

    .floating-search input,
    .floating-search select {
      background: rgba(255, 250, 243, 0.96);
      color: var(--ink);
    }

    .floating-search button {
      background: linear-gradient(135deg, #d9784f, #b85c38);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .floating-search button:hover {
      filter: brightness(1.04);
    }

    .search-result {
      min-height: 22px;
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 250, 243, 0.85);
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 12px 132px;
      }

      .hero,
      .stroke-section {
        padding: 16px;
        border-radius: 20px;
      }

      .intro {
        font-size: 15px;
        line-height: 1.7;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-card {
        padding: 14px 16px;
      }

      .summary-card strong {
        font-size: 22px;
      }

      .section-header h2 {
        font-size: 22px;
      }

      .section-header p {
        font-size: 13px;
      }

      th,
      td {
        padding: 12px 8px;
        font-size: 14px;
      }

      .floating-search {
        right: 12px;
        left: 12px;
        bottom: 12px;
        width: auto;
        padding: 14px;
        border-radius: 20px;
      }

      .floating-search h3 {
        font-size: 18px;
      }

      .floating-search p,
      .search-result {
        font-size: 13px;
      }

      .floating-search input,
      .floating-search select,
      .floating-search button {
        padding: 11px 12px;
      }

      table {
        min-width: 480px;
      }
    }
  </style>
</head>
<body>

    <section class="hero">
      <p class="eyebrow">WEDDING GUEST DIRECTORY</p>
      <h1>婚宴賓客名單</h1>

        也可以使用右下角懸浮查詢框，用姓名快速定位，或從筆畫下拉選單跳轉到指定區段。
      </p>
      <div class="summary" id="summary"></div>
    </section>

    <main class="content" id="content"></main>
  </div>

        return a.name.localeCompare(b.name, "zh-Hant");

      .reduce((groups, person) => {
        if (!groups[person.stroke]) {
          groups[person.stroke] = [];
        }
        groups[person.stroke].push(person);
        return groups;
      }, {});

    const content = document.getElementById("content");
    const strokeSelect = document.getElementById("strokeSelect");
    const nameInput = document.getElementById("nameInput");
    const searchResult = document.getElementById("searchResult");

    function createSummary() {
      const strokeCount = Object.keys(groupedData).length;
      const giftCount = data.filter(person => person.hasGift).length;
      const mainTableCount = data.filter(person => person.table === "主").length;

      const cards = [
        { label: "總賓客數", value: data.length },
        { label: "筆畫區段", value: strokeCount },
        { label: "有禮餅", value: giftCount },
        { label: "主桌名單", value: mainTableCount }
      ];

      summary.innerHTML = cards.map(card => `
        <div class="summary-card">
          <strong>${card.value}</strong>
          <span>${card.label}</span>
        </div>
      `).join("");
    }

    function createTableSection(stroke, people) {
      return `
        <section class="stroke-section" id="stroke-${stroke}">
          <div class="section-header">
            <h2>${stroke} 筆畫</h2>
            <p>共 ${people.length} 筆資料</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>桌號</th>
                  <th>禮餅</th>
                </tr>
              </thead>
              <tbody>
                ${people.map(person => `
                  <tr data-name="${person.name}">
                    <td>${person.name}</td>
                    <td>${person.table}</td>
                    <td>
                      <span class="${person.hasGift ? "gift-yes" : "gift-no"}">
                        ${person.hasGift ? "有" : "無"}
                      </span>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderContent() {
      const strokes = Object.keys(groupedData).map(Number).sort((a, b) => a - b);
      content.innerHTML = strokes.map(stroke => createTableSection(stroke, groupedData[stroke])).join("");
      strokeSelect.innerHTML = `
        <option value="">選擇筆畫跳轉</option>
        ${strokes.map(stroke => `<option value="${stroke}">${stroke} 筆畫</option>`).join("")}
      `;
    }

    function clearHighlights() {
      document.querySelectorAll("tbody tr.targeted").forEach(row => {
        row.classList.remove("targeted");
      });
    }

        return;

      clearHighlights();
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      searchResult.textContent = `已跳轉到 ${stroke} 筆畫區段。`;
    }

    function searchByName() {
      const keyword = nameInput.value.trim();
      clearHighlights();

      if (!keyword) {
        searchResult.textContent = "請先輸入姓名。";
        return;
      }

      const matches = data.filter(person => person.name.includes(keyword));
      if (matches.length === 0) {
        searchResult.textContent = `查無「${keyword}」相關資料。`;
        return;
      }

      const firstMatch = document.querySelector(`tr[data-name="${matches[0].name}"]`);
      matches.forEach(person => {
        const row = document.querySelector(`tr[data-name="${person.name}"]`);
        if (row) row.classList.add("targeted");
      });

      if (firstMatch) {
        firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      const names = matches.slice(0, 3).map(person => person.name).join("、");
      const suffix = matches.length > 3 ? ` 等 ${matches.length} 筆` : `，共 ${matches.length} 筆`;
      searchResult.textContent = `找到 ${names}${suffix}。`;
    }

    document.getElementById("searchBtn").addEventListener("click", searchByName);
    nameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        searchByName();
      }
    });

    strokeSelect.addEventListener("change", event => {
      if (event.target.value) {
        scrollToStroke(event.target.value);
      }
    });

    createSummary();
    renderContent();
  </script>
</body>
</html>
