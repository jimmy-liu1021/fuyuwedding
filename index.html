<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>婚宴賓客名單</title>
  <style>
    :root {
      --bg: #f6efe6;
      --card: rgba(255, 252, 247, 0.96);
      --ink: #2f241c;
      --muted: #7a695c;
      --accent: #b85c38;
      --line: rgba(104, 74, 52, 0.16);
      --shadow: 0 18px 48px rgba(92, 58, 37, 0.14);
      --ok: #2f7d4c;
      --warn: #9b4d30;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(180deg, #fbf6ef 0%, #f4eadc 100%);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 16px 120px;
    }

    .hero {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255, 250, 243, 0.95), rgba(247, 234, 223, 0.96));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.08;
      font-weight: 800;
    }

    .intro {
      max-width: 760px;
      margin: 14px 0 0;
      font-size: 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .summary-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(104, 74, 52, 0.12);
    }

    .summary-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 26px;
    }

    .content {
      margin-top: 24px;
    }

    .stroke-section {
      margin-bottom: 20px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      scroll-margin-top: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 460px;
      table-layout: fixed;
    }

    col.col-name {
      width: 34%;
    }

    col.col-table {
      width: 22%;
    }

    col.col-attendance {
      width: 22%;
    }

    col.col-gift {
      width: 22%;
    }

    th,
    td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    tbody tr.targeted {
      background: rgba(243, 215, 199, 0.62);
    }

    .gift-yes {
      color: var(--ok);
      font-weight: 700;
    }

    .gift-no {
      color: var(--warn);
      font-weight: 700;
    }

    .floating-search {
      position: fixed;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 22px;
      background: rgba(47, 36, 28, 0.94);
      color: #fffaf3;
      box-shadow: 0 24px 60px rgba(36, 23, 16, 0.34);
      backdrop-filter: blur(10px);
      z-index: 20;
      transition: width 0.2s ease, padding 0.2s ease;
    }

    .floating-search-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .floating-search-title {
      min-width: 0;
    }

    .floating-search-title h3 {
      margin: 0;
      font-size: 18px;
    }

    .floating-search-title p {
      margin: 8px 0 0;
      color: rgba(255, 250, 243, 0.72);
      line-height: 1.55;
      font-size: 13px;
    }

    .toggle-search {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 250, 243, 0.22);
      border-radius: 12px;
      background: rgba(255, 250, 243, 0.1);
      color: #fffaf3;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .floating-search-body {
      margin-top: 12px;
    }

    .search-controls {
      display: grid;
      gap: 10px;
    }

    .floating-search input,
    .floating-search select,
    .floating-search button.action-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }

    .floating-search input,
    .floating-search select {
      background: rgba(255, 250, 243, 0.96);
      color: var(--ink);
    }

    .floating-search button.action-btn {
      background: linear-gradient(135deg, #d9784f, #b85c38);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .search-result {
      min-height: 20px;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(255, 250, 243, 0.88);
    }

    .floating-search.collapsed {
      width: auto;
      padding: 10px 12px;
    }

    .floating-search.collapsed .floating-search-title p,
    .floating-search.collapsed .floating-search-body {
      display: none;
    }

    .floating-search.collapsed .floating-search-title h3 {
      font-size: 15px;
    }

    @media (max-width: 720px) {
      .page {
        padding: 18px 12px 110px;
      }

      .hero,
      .stroke-section {
        padding: 16px;
        border-radius: 20px;
      }

      .intro {
        font-size: 15px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-card {
        padding: 14px 15px;
      }

      .summary-card strong {
        font-size: 22px;
      }

      .section-header h2 {
        font-size: 21px;
      }

      .section-header p,
      th,
      td {
        font-size: 13px;
      }

      .table-wrap {
        overflow-x: visible;
      }

      table {
        min-width: 0;
      }

      col.col-name {
        width: 48%;
      }

      col.col-table {
        width: 22%;
      }

      col.col-gift {
        width: 30%;
      }

      th,
      td {
        padding: 10px 6px;
        word-break: break-word;
      }

      .floating-search {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <p class="eyebrow">WEDDING GUEST DIRECTORY</p>
      <h1>婚宴賓客名單</h1>
      <div class="summary" id="summary"></div>
    </section>

    <main class="content" id="content"></main>
  </div>

  <aside class="floating-search" id="floatingSearch">
    <div class="floating-search-header">
      <div class="floating-search-title">
        <h3>快速查詢</h3>
        <p>輸入姓名搜尋或選擇筆畫。</p>
      </div>
      <button id="toggleSearchBtn" class="toggle-search" type="button" aria-expanded="true" aria-label="Toggle search panel">-</button>
    </div>
    <div class="floating-search-body">
      <div class="search-controls">
        <input id="nameInput" type="text" placeholder="輸入姓名">
        <button id="searchBtn" class="action-btn" type="button">搜尋姓名</button>
        <select id="strokeSelect">
          <option value="">選擇筆畫跳轉</option>
        </select>
      </div>
      <div class="search-result" id="searchResult"></div>
    </div>
  </aside>

  <script src="data.js"></script>
  <script>
    const groupedData = data
      .slice()
      .sort((a, b) => {
        if (a.stroke !== b.stroke) return a.stroke - b.stroke;
        return a.name.localeCompare(b.name, "zh-Hant");
      })
      .reduce((groups, person) => {
        if (!groups[person.stroke]) groups[person.stroke] = [];
        groups[person.stroke].push(person);
        return groups;
      }, {});

    const summary = document.getElementById("summary");
    const content = document.getElementById("content");
    const strokeSelect = document.getElementById("strokeSelect");
    const nameInput = document.getElementById("nameInput");
    const searchResult = document.getElementById("searchResult");
    const floatingSearch = document.getElementById("floatingSearch");
    const toggleSearchBtn = document.getElementById("toggleSearchBtn");

    function renderSummary() {
      const cards = [
        { label: "總賓客數", value: data.length },
        { label: "筆畫區段", value: Object.keys(groupedData).length },
        { label: "有禮餅", value: data.filter(person => person.hasGift).length },
        { label: "主桌名單", value: data.filter(person => person.table === "主").length }
      ];

      summary.innerHTML = cards.map(card => `
        <div class="summary-card">
          <strong>${card.value}</strong>
          <span>${card.label}</span>
        </div>
      `).join("");
    }

    function createTableSection(stroke, people) {
      return `
        <section class="stroke-section" id="stroke-${stroke}">
          <div class="section-header">
            <h2>${stroke} 筆畫</h2>
            <p>共 ${people.length} 筆資料</p>
          </div>
          <div class="table-wrap">
            <table>
              <colgroup>
                <col class="col-name">
                <col class="col-table">
                <col class="col-attendance">
                <col class="col-gift">
              </colgroup>
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>桌號</th>
                  <th>人數</th>
                  <th>禮餅</th>
                </tr>
              </thead>
              <tbody>
                ${people.map(person => `
                  <tr data-name="${person.name}">
                    <td>${person.name}</td>
                    <td>${person.table}</td>
                    <td>${person.attendance}</td>
                    <td><span class="${person.hasGift ? "gift-yes" : "gift-no"}">${person.hasGift ? "有" : "無"}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderContent() {
      const strokes = Object.keys(groupedData).map(Number).sort((a, b) => a - b);
      content.innerHTML = strokes.map(stroke => createTableSection(stroke, groupedData[stroke])).join("");
      strokeSelect.innerHTML = `
        <option value="">選擇筆畫跳轉</option>
        ${strokes.map(stroke => `<option value="${stroke}">${stroke} 筆畫</option>`).join("")}
      `;
    }

    function clearHighlights() {
      document.querySelectorAll("tbody tr.targeted").forEach(row => row.classList.remove("targeted"));
    }

    function scrollToStroke(stroke) {
      const target = document.getElementById(`stroke-${stroke}`);
      if (!target) {
        searchResult.textContent = "找不到對應的筆畫區段。";
        return;
      }
      clearHighlights();
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      searchResult.textContent = `已跳轉到 ${stroke} 筆畫區段。`;
    }

    function searchByName() {
      const keyword = nameInput.value.trim();
      clearHighlights();

      if (!keyword) {
        searchResult.textContent = "請先輸入姓名。";
        return;
      }

      const matches = data.filter(person => person.name.includes(keyword));
      if (matches.length === 0) {
        searchResult.textContent = `查無「${keyword}」相關資料。`;
        return;
      }

      const firstMatch = document.querySelector(`tr[data-name="${matches[0].name}"]`);
      matches.forEach(person => {
        const row = document.querySelector(`tr[data-name="${person.name}"]`);
        if (row) row.classList.add("targeted");
      });

      if (firstMatch) firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });

      const names = matches.slice(0, 3).map(person => person.name).join("、");
      const suffix = matches.length > 3 ? ` 等 ${matches.length} 筆` : `，共 ${matches.length} 筆`;
      searchResult.textContent = `找到 ${names}${suffix}。`;
    }

    document.getElementById("searchBtn").addEventListener("click", searchByName);
    nameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") searchByName();
    });

    strokeSelect.addEventListener("change", event => {
      if (event.target.value) scrollToStroke(event.target.value);
    });

    toggleSearchBtn.addEventListener("click", () => {
      const collapsed = floatingSearch.classList.toggle("collapsed");
      toggleSearchBtn.textContent = collapsed ? "+" : "-";
      toggleSearchBtn.setAttribute("aria-expanded", String(!collapsed));
    });

    renderContent();
  </script>
</body>
</html>
